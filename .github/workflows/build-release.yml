name: Build installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer ZIP
        shell: pwsh
        run: ./scripts/build-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: updated-studio-one-click-installer
          path: dist/updated-studio-one-click-installer.zip

  
